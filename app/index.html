<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QOAN | Admin Reports</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600;800&swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --gold-primary: #d4af37;
            --gold-dark: #aa8418;
            --bg-dark: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 20px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        .logo {
            font-family: 'Cinzel', serif;
            color: var(--gold-primary);
            font-size: 1.5rem;
            letter-spacing: 2px;
        }

        .reports-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .chart-box {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            margin-top: 15px;
        }

        h2 { font-size: 0.9rem; color: var(--gold-primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }

        .kpi-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .kpi-item {
            background: rgba(212, 175, 55, 0.05);
            border-left: 3px solid var(--gold-primary);
            padding: 15px;
            border-radius: 8px;
        }

        .kpi-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; display: block; margin-bottom: 5px; }
        .kpi-value { font-size: 1.1rem; font-weight: 800; }

        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .refresh-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--gold-primary);
            color: #000;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: none;
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>
<body>
    <header>
        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <button class="header-btn" onclick="openSettings()" style="background:none; border:none; color:var(--gold-primary); font-size:1.2rem;"><i class="fas fa-cog"></i></button>
            <div class="logo">QOAN APP</div>
            <button class="header-btn" onclick="location.reload()" style="background:none; border:none; color:var(--gold-primary); font-size:1.2rem;"><i class="fas fa-sync-alt"></i></button>
        </div>
        <p style="font-size: 0.7rem; color: var(--text-muted); margin-top: 5px;">PANEL DE CONTROL E INFORMES</p>
    </header>

    <!-- Settings Modal -->
    <div id="modal-settings" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; padding:20px; align-items:center; justify-content:center;">
        <div class="stat-card" style="width:100%; max-width:400px; border:1px solid var(--gold-primary);">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="margin:0;">Ajustes de App</h2>
                <button onclick="closeSettings()" style="background:none; border:none; color:#fff; font-size:1.5rem;">&times;</button>
            </div>
            <div class="settings-group" style="margin-bottom:25px;">
                <h3 style="font-size:0.75rem; color:var(--gold-primary); margin-bottom:15px; text-transform:uppercase;">Notificaciones</h3>
                
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <span style="font-size:0.9rem;">Recordatorios (4 días)</span>
                    <input type="checkbox" id="notif-reminders" checked>
                </div>
                
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <span style="font-size:0.9rem;">Alertas de Mora</span>
                    <input type="checkbox" id="notif-mora" checked>
                </div>

                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:0.9rem;">Resumen Semanal</span>
                    <input type="checkbox" id="notif-summary">
                </div>
            </div>
            <button onclick="saveSettings()" class="refresh-btn" style="position:static; width:100%; border-radius:10px; height:45px; font-weight:800; text-transform:uppercase;">Guardar Cambios</button>
        </div>
    </div>

    <main>
        <div class="kpi-grid">
            <div class="kpi-item">
                <span class="kpi-label">Capital en Calle</span>
                <div id="kpi-capital" class="kpi-value">S/ 0.00</div>
            </div>
            <div class="kpi-item">
                <span class="kpi-label">Ganancia Neta</span>
                <div id="kpi-profit" class="kpi-value" style="color: #27ae60;">S/ 0.00</div>
            </div>
        </div>

        <div class="reports-grid">
            <div class="stat-card">
                <h2>Distribución Financiera</h2>
                <div class="chart-box">
                    <canvas id="chart-distribution"></canvas>
                </div>
            </div>

            <div class="stat-card">
                <h2>Estado de Cartera</h2>
                <div class="chart-box">
                    <canvas id="chart-status"></canvas>
                </div>
            </div>
        </div>
    </main>

    <button class="refresh-btn" onclick="location.reload()">
        <i class="fas fa-sync-alt"></i>
    </button>

    <footer>
        &copy; 2026 QOAN Soluciones Financieras
    </footer>

    <script src="admin.js"></script>
</body>
</html>
